# HuaJunMusic Android Build Pipeline
# Simplified version for stable builds

name: Android Build

on:
  push:
    branches: [ master, main ]
  workflow_dispatch:

jobs:
  build:
    name: Build Debug APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build with Gradle
        run: ./gradlew assembleDebug --no-daemon --stacktrace

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: HuaJunMusic-Debug-APK
          path: app/build/outputs/apk/debug/*.apk
          retention-days: 7

      - name: Build summary
        run: |
          echo "## Build Result" >> $GITHUB_STEP_SUMMARY
          echo "**Status**: ✅ Success" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Artifacts" >> $GITHUB_STEP_SUMMARY
          echo "- Download APK from the *Artifacts* section below" >> $GITHUB_STEP_SUMMARY
          echo "- File: \`HuaJunMusic-Debug-APK\`" >> $GITHUB_STEP_SUMMARY
