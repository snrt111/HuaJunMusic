# ============================================================
# 华军音乐 HuaJunMusic - Android 自动打包 Workflow
# ============================================================

name: Android Build

on:
  push:
    branches: [ master, main ]
    tags:
      - 'v*'
  pull_request:
    branches: [ master, main ]
  workflow_dispatch:
    inputs:
      build_type:
        description: '构建类型 (Build Type)'
        required: true
        default: 'both'
        type: choice
        options:
          - both
          - debug
          - release

# 全局环境变量
env:
  APP_NAME: "HuaJunMusic"
  JAVA_VERSION: "17"
  JAVA_DIST: "temurin"
  ANDROID_COMPILE_SDK: "34"
  ANDROID_BUILD_TOOLS: "34.0.0"
  GRADLE_OPTS: "-Xmx2048m -Dorg.gradle.daemon=false -Dorg.gradle.parallel=true -Dkotlin.incremental=false"

jobs:

  # ==================== Debug APK 构建 ====================
  build-debug:
    name: 构建 Debug APK
    runs-on: ubuntu-latest
    if: ${{ github.event.inputs.build_type != 'release' }}
    timeout-minutes: 45

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java JDK
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: ${{ env.JAVA_DIST }}
          cache: 'gradle'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          cache-encryption-key: ${{ secrets.GRADLE_CACHE_ENCRYPTION_KEY }}
          cache-write-only: false
          cache-read-only: false
          gradle-home-cache-cleanup: true

      - name: 授予 Gradle Wrapper 执行权限
        run: chmod +x ./gradlew

      - name: 构建 Debug APK
        run: ./gradlew assembleDebug --no-daemon --stacktrace --refresh-dependencies

      - name: 上传 Debug APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.APP_NAME }}-Debug-APK
          path: app/build/outputs/apk/debug/*.apk
          retention-days: 30
          compression-level: 9

      - name: Build Summary
        if: success()
        run: |
          echo "## Debug APK 构建完成" >> $GITHUB_STEP_SUMMARY
          echo "- APK 文件已上传至 Artifacts" >> $GITHUB_STEP_SUMMARY

  # ==================== Release APK 构建 ====================
  build-release:
    name: 构建 Release APK
    runs-on: ubuntu-latest
    if: ${{ github.event.inputs.build_type != 'debug' }}
    timeout-minutes: 45
    needs: build-debug

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java JDK
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: ${{ env.JAVA_DIST }}
          cache: 'gradle'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          cache-encryption-key: ${{ secrets.GRADLE_CACHE_ENCRYPTION_KEY }}
          cache-write-only: false
          cache-read-only: false
          gradle-home-cache-cleanup: true

      - name: 授予 Gradle Wrapper 执行权限
        run: chmod +x ./gradlew

      - name: 准备签名 keystore（如已配置）
        id: prepare_keystore
        env:
          KEYSTORE_BASE64: ${{ vars.KEYSTORE_BASE64 }}
        run: |
          if [ -n "$KEYSTORE_BASE64" ]; then
            echo "检测到签名配置 vars.KEYSTORE_BASE64，使用正式签名"
            echo "$KEYSTORE_BASE64" | base64 --decode > $RUNNER_TEMP/release-keystore.jks
            KEYSTORE_PATH="$RUNNER_TEMP/release-keystore.jks"
            echo "KEYSTORE_PATH=$KEYSTORE_PATH" >> $GITHUB_OUTPUT
            echo "HAS_KEYSTORE=true" >> $GITHUB_OUTPUT
          else
            echo "未配置签名密钥，Release APK 将使用默认 debug 签名"
            echo "如需正式签名，请在 Repository Variables 中设置 KEYSTORE_BASE64"
            echo "并在 Repository Secrets 中设置 KEYSTORE_PASSWORD, KEY_ALIAS, KEY_PASSWORD"
            echo "HAS_KEYSTORE=false" >> $GITHUB_OUTPUT
          fi

      - name: 构建 Release APK
        run: ./gradlew assembleRelease --no-daemon --stacktrace
        env:
          KEYSTORE_FILE: ${{ steps.prepare_keystore.outputs.KEYSTORE_PATH }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}

      - name: 上传 Release APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.APP_NAME }}-Release-APK
          path: app/build/outputs/apk/release/*.apk
          retention-days: 90
          compression-level: 9

      - name: Build Summary
        if: success()
        run: |
          echo "## Release APK 构建完成" >> $GITHUB_STEP_SUMMARY
          if [ "${{ steps.prepare_keystore.outputs.HAS_KEYSTORE }}" = "true" ]; then
            echo "- 签名状态: 已使用正式证书签名" >> $GITHUB_STEP_SUMMARY
          else
            echo "- 签名状态: 使用默认 debug 签名（未配置正式签名密钥）" >> $GITHUB_STEP_SUMMARY
          fi
          echo "- APK 文件已上传至 Artifacts" >> $GITHUB_STEP_SUMMARY

  # ==================== 创建 GitHub Release（打 tag 时触发） ====================
  create-release:
    name: 创建 GitHub Release
    runs-on: ubuntu-latest
    needs: build-release
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: 下载 Debug APK
        uses: actions/download-artifact@v4
        with:
          name: ${{ env.APP_NAME }}-Debug-APK
          path: ./artifacts/debug

      - name: 下载 Release APK
        uses: actions/download-artifact@v4
        with:
          name: ${{ env.APP_NAME }}-Release-APK
          path: ./artifacts/release

      - name: 生成 Release Notes
        run: |
          echo "# 华军音乐 ${{ github.ref_name }} 发布" > release_notes.md
          echo "" >> release_notes.md
          echo "## 构建信息" >> release_notes.md
          echo "- 版本: ${{ github.ref_name }}" >> release_notes.md
          echo "- 提交: ${{ github.sha }}" >> release_notes.md
          echo "" >> release_notes.md
          echo "## 下载" >> release_notes.md
          echo "- Release 版（已签名）" >> release_notes.md
          echo "- Debug 版（测试用）" >> release_notes.md

      - name: 创建 GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: 华军音乐 ${{ github.ref_name }}
          body_path: release_notes.md
          files: |
            ./artifacts/release/*.apk
            ./artifacts/debug/*.apk
