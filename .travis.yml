language: android
jdk: oraclejdk17

android:
  components:
    - tools
    - platform-tools
    - build-tools-32.0.0
    - android-32
    - extra-google-m2repository
    - extra-android-m2repository

before_install:
  - chmod +x gradlew
  - yes | sdkmanager "platforms;android-32"

script:
  - ./gradlew assembleDebug

deploy:
  provider: releases
  api_key: $GITHUB_TOKEN
  file: app/build/outputs/apk/debug/app-debug.apk
  skip_cleanup: true
  on:
    tags: true

cache:
  directories:
    - $HOME/.gradle/caches/
    - $HOME/.gradle/wrapper/
    - $HOME/.android/build-cache
