plugins {
    id 'com.android.application'
}

android {
    namespace 'com.huajun.music'
    compileSdk 33

    defaultConfig {
        applicationId "com.huajun.music"
        minSdk 24
        targetSdk 33
        versionCode 1
        versionName "1.0"
        testInstrumentationRunner "androidx.test.runner.AndroidJUnitRunner"
        multiDexEnabled true
    }

    // 排除历史遗留代码（com.snrt.helloworld）避免编译错误
    sourceSets {
        main {
            java {
                exclude 'com/snrt/**'
            }
        }
    }

    signingConfigs {
        release {
            def storeFileEnv = System.getenv("KEYSTORE_FILE")
            def storePasswordEnv = System.getenv("KEYSTORE_PASSWORD")
            def keyAliasEnv = System.getenv("KEY_ALIAS")
            def keyPasswordEnv = System.getenv("KEY_PASSWORD")

            if (storeFileEnv != null && !storeFileEnv.isEmpty()
                    && storePasswordEnv != null && !storePasswordEnv.isEmpty()
                    && keyAliasEnv != null && !keyAliasEnv.isEmpty()
                    && keyPasswordEnv != null && !keyPasswordEnv.isEmpty()) {
                storeFile file(storeFileEnv)
                storePassword storePasswordEnv
                keyAlias keyAliasEnv
                keyPassword keyPasswordEnv
            } else {
                def propsFile = rootProject.file("app/keystore/keystore.properties")
                if (propsFile.exists()) {
                    def props = new Properties()
                    props.load(new FileInputStream(propsFile))
                    storeFile file(props.getProperty("STORE_FILE"))
                    storePassword props.getProperty("STORE_PASSWORD")
                    keyAlias props.getProperty("KEY_ALIAS")
                    keyPassword props.getProperty("KEY_PASSWORD")
                }
            }
        }
    }

    buildTypes {
        debug {
            debuggable true
            minifyEnabled false
        }
        release {
            minifyEnabled false
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
            if (signingConfigs.release.storeFile != null) {
                signingConfig signingConfigs.release
            }
        }
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_11
        targetCompatibility JavaVersion.VERSION_11
        coreLibraryDesugaringEnabled true
    }
}

dependencies {
    implementation fileTree(dir: 'libs', include: ['*.jar'])

    // 核心库 desugaring（与 AGP 7.4.x 兼容）
    coreLibraryDesugaring 'com.android.tools:desugar_jdk_libs:2.0.4'

    // Kotlin 标准库（现代 AndroidX 依赖底层使用 Kotlin 编写）
    implementation 'org.jetbrains.kotlin:kotlin-stdlib-jdk8:1.8.22'

    // AndroidX 核心 UI（与 AGP 7.4.x 兼容的稳定版本）
    implementation 'androidx.appcompat:appcompat:1.6.1'
    implementation 'androidx.core:core:1.12.0'
    implementation 'androidx.activity:activity:1.7.2'
    implementation 'androidx.fragment:fragment:1.6.1'
    implementation 'androidx.constraintlayout:constraintlayout:2.1.4'
    implementation 'androidx.recyclerview:recyclerview:1.3.2'
    implementation 'androidx.cardview:cardview:1.0.0'
    implementation 'androidx.swiperefreshlayout:swiperefreshlayout:1.1.0'
    implementation 'androidx.viewpager2:viewpager2:1.0.0'

    // Material Design
    implementation 'com.google.android.material:material:1.9.0'

    // Glide 图片加载
    implementation 'com.github.bumptech.glide:glide:4.16.0'

    // Media3 / ExoPlayer（稳定版 1.0.2，与 AGP 7.4.x 兼容）
    implementation 'androidx.media3:media3-exoplayer:1.0.2'
    implementation 'androidx.media3:media3-common:1.0.2'
    implementation 'androidx.media3:media3-session:1.0.2'

    // LiveData / Lifecycle
    implementation 'androidx.lifecycle:lifecycle-runtime:2.6.1'
    implementation 'androidx.lifecycle:lifecycle-livedata:2.6.1'
    implementation 'androidx.lifecycle:lifecycle-common:2.6.1'

    // 网络与 JSON
    implementation 'com.google.code.gson:gson:2.10.1'
    implementation 'com.squareup.okhttp3:okhttp:4.12.0'

    // 测试依赖
    testImplementation 'junit:junit:4.13.2'
    androidTestImplementation 'androidx.test.ext:junit:1.1.5'
    androidTestImplementation 'androidx.test.espresso:espresso-core:3.5.1'
}
