plugins {
    id 'com.android.application'
}

android {
    namespace 'com.huajun.music'
    compileSdk 34

    defaultConfig {
        applicationId "com.huajun.music"
        minSdk 24
        targetSdk 34
        versionCode 1
        versionName "1.0"
        testInstrumentationRunner "androidx.test.runner.AndroidJUnitRunner"
        // 启用 MultiDex：解决 65K 方法数限制，避免 Dexing 错误
        multiDexEnabled true
    }

    signingConfigs {
        release {
            def storeFileEnv = System.getenv("KEYSTORE_FILE")
            def storePasswordEnv = System.getenv("KEYSTORE_PASSWORD")
            def keyAliasEnv = System.getenv("KEY_ALIAS")
            def keyPasswordEnv = System.getenv("KEY_PASSWORD")

            if (storeFileEnv != null && storePasswordEnv != null && keyAliasEnv != null && keyPasswordEnv != null) {
                storeFile file(storeFileEnv)
                storePassword storePasswordEnv
                keyAlias keyAliasEnv
                keyPassword keyPasswordEnv
            } else {
                def propsFile = rootProject.file("app/keystore/keystore.properties")
                if (propsFile.exists()) {
                    def props = new Properties()
                    props.load(new FileInputStream(propsFile))
                    storeFile file(props.getProperty("STORE_FILE"))
                    storePassword props.getProperty("STORE_PASSWORD")
                    keyAlias props.getProperty("KEY_ALIAS")
                    keyPassword props.getProperty("KEY_PASSWORD")
                } else {
                    println "⚠️  Warning: No release signing config found. Using debug signing."
                }
            }
        }
    }

    buildTypes {
        debug {
            debuggable true
        }
        release {
            minifyEnabled false
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
            if (signingConfigs.release.storeFile != null) {
                signingConfig signingConfigs.release
            }
        }
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
        // 显式启用核心库 desugaring，确保 Java 8+ API 兼容性
        coreLibraryDesugaringEnabled true
    }
}

// ===== 依赖解析策略：强制版本一致性 =====
configurations.all {
    resolutionStrategy {
        force 'androidx.core:core:1.10.1'
        force 'androidx.appcompat:appcompat:1.6.1'
        force 'androidx.lifecycle:lifecycle-runtime:2.5.1'
        force 'androidx.lifecycle:lifecycle-livedata:2.5.1'
        force 'androidx.fragment:fragment:1.5.7'
        force 'androidx.activity:activity:1.7.2'
        force 'androidx.recyclerview:recyclerview:1.3.1'
        force 'androidx.constraintlayout:constraintlayout:2.1.4'
        force 'androidx.swiperefreshlayout:swiperefreshlayout:1.1.0'
        force 'androidx.viewpager2:viewpager2:1.0.0'
        force 'androidx.cardview:cardview:1.0.0'
        cacheChangingModulesFor 0, 'seconds'
    }
}

dependencies {
    implementation fileTree(dir: 'libs', include: ['*.jar'])

    // ===== 核心库 desugaring：解决 Java 8+ API 兼容性 =====
    coreLibraryDesugaring 'com.android.tools:desugar_jdk_libs:2.0.4'

    // ===== AndroidX 核心 UI（使用 2023 年初的稳定版本，与 AGP 7.4.2 完美兼容）=====
    implementation 'androidx.appcompat:appcompat:1.6.1'
    implementation 'androidx.core:core:1.10.1'
    implementation 'androidx.activity:activity:1.7.2'
    implementation 'androidx.fragment:fragment:1.5.7'
    implementation 'androidx.constraintlayout:constraintlayout:2.1.4'
    implementation 'androidx.recyclerview:recyclerview:1.3.1'
    implementation 'androidx.cardview:cardview:1.0.0'
    implementation 'androidx.swiperefreshlayout:swiperefreshlayout:1.1.0'
    implementation 'androidx.viewpager2:viewpager2:1.0.0'
    implementation 'androidx.multidex:multidex:2.0.1'

    // ===== Material Design（1.9.x 与 AGP 7.4.2 经过充分验证）=====
    implementation 'com.google.android.material:material:1.9.0'

    // ===== Glide 图片加载（4.12.x 是最稳定、最广泛使用的版本）=====
    implementation 'com.github.bumptech.glide:glide:4.12.0'

    // ===== Media3 / ExoPlayer（音乐播放核心，使用 1.0.x 稳定分支）=====
    implementation 'androidx.media3:media3-exoplayer:1.0.2'
    implementation 'androidx.media3:media3-common:1.0.2'

    // ===== LiveData / Lifecycle（观察模式，2.5.x 与 AGP 7.4.2 完全兼容）=====
    implementation 'androidx.lifecycle:lifecycle-runtime:2.5.1'
    implementation 'androidx.lifecycle:lifecycle-livedata:2.5.1'

    // ===== 网络与 JSON（OkHttp 3.x 是纯 Java 版本，字节码完全兼容 Java 8）=====
    implementation 'com.google.code.gson:gson:2.10.1'
    implementation 'com.squareup.okhttp3:okhttp:3.14.9'

    testImplementation 'junit:junit:4.13.2'
    androidTestImplementation 'androidx.test.ext:junit:1.1.5'
    androidTestImplementation 'androidx.test.espresso:espresso-core:3.5.1'
}
