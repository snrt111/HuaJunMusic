plugins {
    id 'com.android.application'
}

// ============================================
// 华军音乐 - Android应用构建配置
// 支持在线打包系统（CI/CD）
// ============================================

android {
    namespace 'com.snrt.helloworld'
    compileSdk 32

    defaultConfig {
        applicationId "com.snrt.helloworld"
        minSdk 24
        targetSdk 32
        versionCode 1
        versionName "1.0"

        testInstrumentationRunner "androidx.test.runner.AndroidJUnitRunner"
    }

    // ============================================
    // 签名配置（支持CI/CD自动打包）
    // ============================================
    def keystorePropertiesFile = rootProject.file("app/keystore/keystore.properties")
    def keystoreProperties = new Properties()

    if (keystorePropertiesFile.exists()) {
        // 开发环境：从本地文件读取签名配置
        keystoreProperties.load(new FileInputStream(keystorePropertiesFile))
        println("✅ 已加载本地签名配置: ${keystorePropertiesFile}")
    } else {
        println("⚠️ 未找到签名配置文件，Release构建将使用debug签名")
        // CI/CD环境：通过环境变量或Gradle属性传递（由GitHub Actions设置）
    }

    signingConfigs {
        debug {
            // Debug签名使用默认配置
        }

        release {
            if (keystorePropertiesFile.exists()) {
                // 本地开发环境：使用keystore.properties
                storeFile file(keystoreProperties['STORE_FILE'])
                storePassword keystoreProperties['STORE_PASSWORD']
                keyAlias keystoreProperties['KEY_ALIAS']
                keyPassword keystoreProperties['KEY_PASSWORD']
            } else if (project.hasProperty('KEYSTORE_FILE')) {
                // CI/CD环境：使用Gradle属性（由GitHub Actions注入）
                storeFile file(project.property('KEYSTORE_FILE'))
                storePassword project.property('KEYSTORE_PASSWORD')
                keyAlias project.property('KEY_ALIAS')
                keyPassword project.property('KEY_PASSWORD')
            } else {
                // 无签名配置时使用debug签名（仅用于测试）
                println("⚠️ Release构建未配置签名，将使用debug证书")
            }
        }
    }

    lint {
        baseline = file("lint-baseline.xml")
    }

    buildTypes {
        debug {
            // Debug构建：使用默认debug签名
            applicationIdSuffix ".debug"
            versionNameSuffix "-DEBUG"
            debuggable true
        }

        release {
            // Release构建：使用配置的签名
            signingConfig signingConfigs.release
            minifyEnabled false
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'

            // 构建产物命名规则：app-{flavor}-{versionName}.apk
            applicationVariants.all { variant ->
                variant.outputs.all { output ->
                    def appName = "HuajunMusic"
                    def versionName = variant.versionName
                    def buildType = variant.buildType.name
                    def date = new Date().format('yyyyMMdd')

                    outputFileName = "${appName}-${buildType}-v${versionName}-${date}.apk"
                }
            }
        }
    }
    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }
    sourceSets {
        main {
            assets {
                srcDirs 'src\\main\\assets'
            }
        }
    }
}

dependencies {
    implementation fileTree(dir: 'libs', include: ['*.jar'])
    implementation 'androidx.appcompat:appcompat:1.4.1'
    implementation 'com.google.android.material:material:1.5.0'
    implementation 'androidx.constraintlayout:constraintlayout:2.1.3'
    implementation 'androidx.annotation:annotation:1.3.0'
    testImplementation 'junit:junit:4.13.2'
    androidTestImplementation 'androidx.test.ext:junit:1.1.3'
    androidTestImplementation 'androidx.test.espresso:espresso-core:3.4.0'
    // 其他依赖库
    implementation 'com.google.code.gson:gson:2.8.4'
    implementation 'com.squareup.okhttp3:okhttp:3.4.1'
    implementation 'cn.hutool:hutool-all:5.7.14'
    api 'org.aspectj:aspectjrt:1.9.8'
}



import org.aspectj.bridge.IMessage
import org.aspectj.bridge.MessageHandler
import org.aspectj.tools.ajc.Main
final def log = project.logger
final def variants = project.android.applicationVariants

variants.all { variant ->
    JavaCompile javaCompile = variant.javaCompileProvider.get()
    javaCompile.doLast {
        String[] args = ["-showWeaveInfo",
                         "-17",
                         "-inpath", javaCompile.destinationDir.toString(),
                         "-aspectpath", javaCompile.classpath.asPath,
                         "-d", javaCompile.destinationDir.toString(),
                         "-classpath", javaCompile.classpath.asPath,
                         "-bootclasspath", project.android.bootClasspath.join(File.pathSeparator)]

        MessageHandler handler = new MessageHandler(true)
        new Main().run(args, handler)
        for (IMessage message : handler.getMessages(null, true)) {
            switch (message.getKind()) {
                case IMessage.ABORT:
                case IMessage.ERROR:
                case IMessage.FAIL:
                    log.error message.message, message.thrown
                    break
                case IMessage.WARNING:
                    log.warn message.message, message.thrown
                    break
                case IMessage.INFO:
                    log.info message.message, message.thrown
                    break
                case IMessage.DEBUG:
                    log.debug message.message, message.thrown
                    break
            }
        }
    }
}
