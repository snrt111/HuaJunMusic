plugins {
    id 'com.android.application'
}

android {
    namespace 'com.huajun.music'
    compileSdk 34

    defaultConfig {
        applicationId "com.huajun.music"
        minSdk 24
        targetSdk 34
        versionCode 1
        versionName "1.0"
        testInstrumentationRunner "androidx.test.runner.AndroidJUnitRunner"
        multiDexEnabled true
    }

    signingConfigs {
        release {
            def storeFileEnv = System.getenv("KEYSTORE_FILE")
            def storePasswordEnv = System.getenv("KEYSTORE_PASSWORD")
            def keyAliasEnv = System.getenv("KEY_ALIAS")
            def keyPasswordEnv = System.getenv("KEY_PASSWORD")

            if (storeFileEnv != null && storePasswordEnv != null && keyAliasEnv != null && keyPasswordEnv != null) {
                storeFile file(storeFileEnv)
                storePassword storePasswordEnv
                keyAlias keyAliasEnv
                keyPassword keyPasswordEnv
            } else {
                def propsFile = rootProject.file("app/keystore/keystore.properties")
                if (propsFile.exists()) {
                    def props = new Properties()
                    props.load(new FileInputStream(propsFile))
                    storeFile file(props.getProperty("STORE_FILE"))
                    storePassword props.getProperty("STORE_PASSWORD")
                    keyAlias props.getProperty("KEY_ALIAS")
                    keyPassword props.getProperty("KEY_PASSWORD")
                } else {
                    println "⚠️  Warning: No release signing config found. Using debug signing."
                }
            }
        }
    }

    buildTypes {
        debug {
            debuggable true
        }
        release {
            minifyEnabled false
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
            if (signingConfigs.release.storeFile != null) {
                signingConfig signingConfigs.release
            }
        }
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
        coreLibraryDesugaringEnabled true
    }
}

dependencies {
    implementation fileTree(dir: 'libs', include: ['*.jar'])

    // ===== 核心库 desugaring =====
    coreLibraryDesugaring 'com.android.tools:desugar_jdk_libs:2.0.4'

    // ===== AndroidX 核心 UI =====
    implementation 'androidx.appcompat:appcompat:1.6.1'
    implementation 'androidx.core:core:1.10.1'
    implementation 'androidx.activity:activity:1.7.2'
    implementation 'androidx.fragment:fragment:1.5.7'
    implementation 'androidx.constraintlayout:constraintlayout:2.1.4'
    implementation 'androidx.recyclerview:recyclerview:1.3.1'
    implementation 'androidx.cardview:cardview:1.0.0'
    implementation 'androidx.swiperefreshlayout:swiperefreshlayout:1.1.0'
    implementation 'androidx.viewpager2:viewpager2:1.0.0'

    // ===== Material Design 3 =====
    implementation 'com.google.android.material:material:1.9.0'

    // ===== Glide 图片加载（排除 bundle 的 annotation 类，避免与 AndroidX 核心类重复）=====
    implementation('com.github.bumptech.glide:glide:4.12.0') {
        exclude group: 'androidx.annotation'
    }

    // ===== Media3 / ExoPlayer（音乐播放核心，仅声明 exoplayer，common 会作为传递依赖自动引入）=====
    implementation('androidx.media3:media3-exoplayer:1.0.2') {
        exclude group: 'androidx.annotation'
    }

    // ===== LiveData / Lifecycle =====
    implementation 'androidx.lifecycle:lifecycle-runtime:2.5.1'
    implementation 'androidx.lifecycle:lifecycle-livedata:2.5.1'

    // ===== 网络与 JSON =====
    implementation 'com.google.code.gson:gson:2.10.1'
    implementation('com.squareup.okhttp3:okhttp:3.14.9') {
        exclude group: 'androidx.annotation'
    }

    testImplementation 'junit:junit:4.13.2'
    androidTestImplementation 'androidx.test.ext:junit:1.1.5'
    androidTestImplementation 'androidx.test.espresso:espresso-core:3.5.1'
}
