plugins {
    id 'com.android.application'
}

android {
    namespace 'com.huajun.music'
    compileSdk 34

    defaultConfig {
        applicationId "com.huajun.music"
        minSdk 24
        targetSdk 34
        versionCode 1
        versionName "1.0"
        testInstrumentationRunner "androidx.test.runner.AndroidJUnitRunner"
    }

    signingConfigs {
        release {
            def storeFileEnv = System.getenv("KEYSTORE_FILE")
            def storePasswordEnv = System.getenv("KEYSTORE_PASSWORD")
            def keyAliasEnv = System.getenv("KEY_ALIAS")
            def keyPasswordEnv = System.getenv("KEY_PASSWORD")

            if (storeFileEnv != null && storePasswordEnv != null && keyAliasEnv != null && keyPasswordEnv != null) {
                storeFile file(storeFileEnv)
                storePassword storePasswordEnv
                keyAlias keyAliasEnv
                keyPassword keyPasswordEnv
            } else {
                def propsFile = rootProject.file("app/keystore/keystore.properties")
                if (propsFile.exists()) {
                    def props = new Properties()
                    props.load(new FileInputStream(propsFile))
                    storeFile file(props.getProperty("STORE_FILE"))
                    storePassword props.getProperty("STORE_PASSWORD")
                    keyAlias props.getProperty("KEY_ALIAS")
                    keyPassword props.getProperty("KEY_PASSWORD")
                } else {
                    println "⚠️  Warning: No release signing config found. Using debug signing."
                }
            }
        }
    }

    buildTypes {
        debug {
            debuggable true
        }
        release {
            minifyEnabled false
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
            if (signingConfigs.release.storeFile != null) {
                signingConfig signingConfigs.release
            }
        }
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }
}

// ===== 依赖解析策略：强制版本一致性，避免 CI 构建因版本冲突失败 =====
configurations.all {
    resolutionStrategy {
        // 强制核心 AndroidX 库的版本一致性
        force 'androidx.core:core:1.12.0'
        force 'androidx.appcompat:appcompat:1.6.1'
        force 'androidx.lifecycle:lifecycle-runtime:2.6.2'
        force 'androidx.lifecycle:lifecycle-livedata:2.6.2'
        force 'androidx.fragment:fragment:1.6.2'
        force 'androidx.activity:activity:1.8.2'
        force 'androidx.recyclerview:recyclerview:1.3.2'
        force 'androidx.constraintlayout:constraintlayout:2.1.4'
        force 'androidx.swiperefreshlayout:swiperefreshlayout:1.1.0'
        force 'androidx.viewpager2:viewpager2:1.1.0'
        force 'androidx.cardview:cardview:1.0.0'
        // 禁用缓存变更模块，避免 CI 缓存问题
        cacheChangingModulesFor 0, 'seconds'
    }
}

dependencies {
    implementation fileTree(dir: 'libs', include: ['*.jar'])

    // ===== AndroidX 核心 UI 框架（经过 AGP 7.4.2 验证的稳定版本）=====
    implementation 'androidx.appcompat:appcompat:1.6.1'
    implementation 'androidx.core:core:1.12.0'
    implementation 'androidx.activity:activity:1.8.2'
    implementation 'androidx.fragment:fragment:1.6.2'
    implementation 'androidx.constraintlayout:constraintlayout:2.1.4'
    implementation 'androidx.recyclerview:recyclerview:1.3.2'
    implementation 'androidx.cardview:cardview:1.0.0'
    implementation 'androidx.swiperefreshlayout:swiperefreshlayout:1.1.0'
    implementation 'androidx.viewpager2:viewpager2:1.1.0'

    // ===== Material Design 3（降级到更稳定的版本，与 AGP 7.4.2 兼容性更好）=====
    implementation 'com.google.android.material:material:1.10.0'

    // ===== 图片加载 (Glide) —— 从 Maven Central 获取，无需 JitPack =====
    implementation 'com.github.bumptech.glide:glide:4.15.1'

    // ===== Media3 / ExoPlayer（音乐播放核心，使用更稳定的 1.1.x 版本）=====
    implementation 'androidx.media3:media3-exoplayer:1.1.1'
    implementation 'androidx.media3:media3-common:1.1.1'

    // ===== LiveData / Lifecycle（观察模式，与 AGP 7.4.2 兼容性更好的版本）=====
    implementation 'androidx.lifecycle:lifecycle-runtime:2.6.2'
    implementation 'androidx.lifecycle:lifecycle-livedata:2.6.2'

    // ===== 网络与 JSON（使用更广泛测试的版本）=====
    implementation 'com.google.code.gson:gson:2.10.1'
    implementation 'com.squareup.okhttp3:okhttp:4.10.0'

    testImplementation 'junit:junit:4.13.2'
    androidTestImplementation 'androidx.test.ext:junit:1.1.5'
    androidTestImplementation 'androidx.test.espresso:espresso-core:3.5.1'
}
